<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Performance Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
/* ── 3-COLOR PALETTE ─────────────────────────────────────────────────────────
   C1: #1B4F7A  Navy  (primary, charts, headers)
   C2: #E05A2B  Coral (accent, highlight, targets)
   C3: #111827  Ink   (text, borders)
   All other values are opacities/tints of these three.
────────────────────────────────────────────────────────────────────────────*/
:root {
  --c1:#1B4F7A; --c1b:#2C6FAA; --c1l:rgba(27,79,122,.1); --c1ll:rgba(27,79,122,.05);
  --c2:#E05A2B; --c2l:rgba(224,90,43,.1);
  --c3:#111827;
  --ink2:#374151; --ink3:#6B7280; --ink4:#9CA3AF; --border:#E5E7EB; --bg:#F8FAFB;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,Arial,sans-serif;background:#fff;color:var(--c3);font-size:15px;line-height:1.5}

/* ── TOPBAR ── */
.topbar{background:var(--c1);height:54px;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{color:#fff;font-size:1rem;font-weight:700;letter-spacing:.3px}
.topbar-title span{opacity:.5;font-weight:400;font-size:.85rem;margin-left:8px}
#topPeriodLabel{color:rgba(255,255,255,.45);font-size:.8rem}

/* ── CONTROL BAR ── */
.ctrlbar{background:#fff;border-bottom:2px solid var(--c1);padding:10px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.clabel{font-size:.72rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px}
.seg{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg button{padding:7px 20px;border:none;background:transparent;color:var(--ink3);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s}
.seg button.on{background:var(--c1);color:#fff}
.seg button:hover:not(.on){background:var(--c1l);color:var(--c1)}
.ypill{padding:6px 16px;border:1.5px solid var(--border);border-radius:20px;background:#fff;color:var(--ink3);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.ypill.on{background:var(--c1);border-color:var(--c1);color:#fff}
.ypill:hover:not(.on){border-color:var(--c1);color:var(--c1)}
.divider{width:1px;height:28px;background:var(--border)}
.tgt-row{display:flex;align-items:center;gap:8px;margin-left:auto}
.tgt-row label{font-size:.78rem;color:var(--ink3);font-weight:500}
.tgt-row input{width:120px;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:.82rem;color:var(--c3)}
.tgt-row input:focus{outline:none;border-color:var(--c1)}
.btn{padding:6px 16px;background:var(--c1);color:#fff;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer}
.btn:hover{background:var(--c1b)}

/* ── MAIN ── */
.main{padding:22px 28px;max-width:1580px;margin:0 auto}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;cursor:default;transition:box-shadow .15s}
.kpi:hover{box-shadow:0 4px 18px rgba(27,79,122,.1)}
.kpi-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--c1)}
.kpi-bar.accent{background:var(--c2)}
.kpi-label{font-size:.72rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.kpi-val{font-size:1.7rem;font-weight:700;color:var(--c3);line-height:1}
.kpi-sub{font-size:.72rem;color:var(--ink4);margin-top:4px}
.kpi-ach{font-size:.78rem;font-weight:700;margin-top:6px}
.ach-ok{color:var(--c1)}.ach-no{color:var(--c2)}

/* ── CARD ── */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.card-head{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:.8rem;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--c1)}
.cdot.a{background:var(--c2)}
.card-body{padding:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* ── TABLE ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:var(--bg);color:var(--ink3);padding:10px 14px;text-align:right;font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
thead th:first-child{text-align:left}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--c1ll)}
tbody td{padding:11px 14px;text-align:right;color:var(--ink2)}
tbody td:first-child{text-align:left;color:var(--c3);font-weight:600}
tfoot td{padding:10px 14px;text-align:right;background:var(--c1l);font-weight:700;color:var(--c1);border-top:2px solid var(--c1);font-size:.85rem}
tfoot td:first-child{text-align:left}

/* REP ROW – clickable */
.rep-clickable{cursor:pointer}
.rep-clickable:hover td:first-child{color:var(--c1);text-decoration:underline}
.drill-icon{font-size:.72rem;color:var(--ink4);margin-left:5px;font-weight:400}

/* ── ACHIEVEMENT BAR ── */
.ach-wrap{display:flex;align-items:center;gap:8px}
.ach-bg{flex:1;height:6px;background:var(--border);border-radius:3px;min-width:55px}
.ach-fill{height:6px;border-radius:3px}
.ach-pct{font-size:.78rem;font-weight:700;min-width:44px;text-align:right}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:700;white-space:nowrap;border:1px solid transparent}
.t1{background:var(--c1l);color:var(--c1);border-color:rgba(27,79,122,.2)}
.t2{background:var(--c2l);color:var(--c2);border-color:rgba(224,90,43,.2)}

/* ── LEADERBOARD ── */
.lb-search{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;color:var(--c3);margin-bottom:16px;transition:border-color .15s}
.lb-search:focus{outline:none;border-color:var(--c1)}
.lb-list{display:flex;flex-direction:column;gap:0}
.lb-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.lb-item:last-child{border-bottom:none}
.lb-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.rk1{background:var(--c1);color:#fff}
.rk2{background:rgba(27,79,122,.6);color:#fff}
.rk3{background:rgba(27,79,122,.35);color:#fff}
.rkn{background:var(--bg);color:var(--ink4);border:1px solid var(--border)}
.lb-name{flex:1;font-size:.9rem;font-weight:600;color:var(--c3)}
.lb-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.lb-qty{font-size:1rem;font-weight:700;color:var(--c1)}
.lb-rev{font-size:.75rem;color:var(--ink3)}
.lb-bar-wrap{width:100px;height:5px;background:var(--border);border-radius:3px}
.lb-bar{height:5px;background:var(--c1);border-radius:3px;transition:width .4s}
.no-result{padding:20px 0;text-align:center;color:var(--ink4);font-size:.9rem}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;width:100%;max-width:680px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(16px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:1rem;font-weight:700;color:var(--c3)}
.modal-head p{font-size:.8rem;color:var(--ink3);margin-top:2px}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--ink3);transition:all .15s;flex-shrink:0}
.modal-close:hover{background:var(--c2);border-color:var(--c2);color:#fff}
.modal-body{padding:18px 22px;overflow-y:auto}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.mstat{background:var(--bg);border-radius:9px;padding:12px 14px;text-align:center}
.mstat-val{font-size:1.4rem;font-weight:700;color:var(--c1)}
.mstat-lbl{font-size:.7rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.modal table tbody tr:hover{background:var(--c1ll)}

/* ── SEARCH RESULT ── */
.search-result{background:var(--c1l);border:1px solid rgba(27,79,122,.2);border-radius:10px;padding:16px;margin-top:12px;display:none}
.search-result.show{display:block}
.sr-name{font-size:1rem;font-weight:700;color:var(--c1);margin-bottom:10px}
.sr-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(27,79,122,.1);font-size:.88rem}
.sr-row:last-child{border-bottom:none}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr 1fr}.main{padding:14px}.ctrlbar{padding:8px 14px}}
</style>
</head>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">📊 Sales Performance Report <span>Shipped Local · KRW</span></div>
  <span id="topPeriodLabel"></span>
</div>

<!-- CONTROL BAR -->
<div class="ctrlbar">
  <span class="clabel">년도</span>
  <div style="display:flex;gap:6px" id="yearPills"></div>
  <div class="divider"></div>
  <span class="clabel">보기</span>
  <div class="seg">
    <button id="btnM" class="on" onclick="setMode('M')">월별</button>
    <button id="btnQ" onclick="setMode('Q')">분기별</button>
    <button id="btnY" onclick="setMode('Y')">년도 비교</button>
  </div>
  <div class="tgt-row">
    <label>🎯 기간 타겟 (억 원)</label>
    <input type="number" id="tgtInput" value="300" placeholder="타겟">
    <button class="btn" onclick="render()">적용</button>
  </div>
</div>

<div class="main">
  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- TOTAL REVENUE CHART -->
  <div class="card">
    <div class="card-head">
      <div class="card-title"><span class="cdot"></span>전체 매출 추이</div>
      <span id="totalChartMeta" style="font-size:.75rem;color:var(--ink3)"></span>
    </div>
    <div class="card-body" style="padding-bottom:12px"><canvas id="totalChart" height="75"></canvas></div>
  </div>

  <!-- SYS QTY + REV -->
  <div class="grid2">
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title"><span class="cdot a"></span>시스템별 판매 대수</div></div>
      <div class="card-body"><canvas id="sysQtyChart" height="200"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title"><span class="cdot"></span>시스템별 매출</div></div>
      <div class="card-body"><canvas id="sysRevChart" height="200"></canvas></div>
    </div>
  </div>
  <div style="height:16px"></div>

  <!-- REP TABLE -->
  <div class="card">
    <div class="card-head">
      <div class="card-title"><span class="cdot"></span>담당자별 실적 <span style="font-size:.7rem;color:var(--ink4);font-weight:400;text-transform:none;letter-spacing:0">— 이름 클릭 시 고객 상세 조회</span></div>
      <span style="font-size:.75rem;color:var(--ink3)">매출 · 시스템 · 달성률</span>
    </div>
    <div class="card-body">
      <div class="twrap" id="repTable"></div>
    </div>
  </div>

  <!-- SYS TABLE -->
  <div class="card">
    <div class="card-head"><div class="card-title"><span class="cdot a"></span>시스템 제품 판매 현황</div></div>
    <div class="card-body"><div class="twrap" id="sysTable"></div></div>
  </div>

  <!-- TOP 10 + SEARCH -->
  <div class="grid2">
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title"><span class="cdot"></span>Top 10 고객 (시스템 구매량 기준)</div></div>
      <div class="card-body" id="top10List"></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-head"><div class="card-title"><span class="cdot a"></span>고객 검색</div></div>
      <div class="card-body">
        <input class="lb-search" id="custSearch" type="text" placeholder="고객명 입력..." oninput="searchCustomer(this.value)">
        <div id="searchResultArea"></div>
        <div id="searchList" class="lb-list"></div>
      </div>
    </div>
  </div>
  <div style="height:16px"></div>
</div>

<!-- DRILL-DOWN MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div>
        <h2 id="modalTitle">담당자 상세</h2>
        <p id="modalSub" style="color:var(--ink3)"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmtB  = v => (v/1e8).toFixed(1)+'억';
const fmtN  = v => Math.round(v).toLocaleString();
const C1='#1B4F7A', C2='#E05A2B', C3='#111827';
const C1A = a=>`rgba(27,79,122,${a})`, C2A = a=>`rgba(224,90,43,${a})`;

Chart.defaults.font.family = "'Segoe UI',Arial,sans-serif";
Chart.defaults.font.size   = 13;
Chart.defaults.color       = '#6B7280';
Chart.register(ChartDataLabels);

// ─── STATE ───────────────────────────────────────────────────────────────────
let mode='M', selYear='all';
const charts={};

function src(key) {
  const m={total:{M:'monthly_total',Q:'quarterly_total',Y:'yearly_total'},rep:{M:'rep_monthly',Q:'rep_quarterly',Y:'rep_yearly'},sys:{M:'sys_monthly',Q:'sys_quarterly',Y:'sys_yearly'},repsys:{M:'rep_sys_monthly',Q:'rep_sys_quarterly',Y:'rep_sys_yearly'}};
  const all=D[m[key][mode]]||[];
  if(selYear==='all'||mode==='Y') return all;
  return all.filter(r=>r.period.startsWith(selYear));
}
function periods(){
  if(mode==='M') return selYear==='all'?D.months:D.months.filter(m=>m.startsWith(selYear));
  if(mode==='Q') return selYear==='all'?D.quarters:D.quarters.filter(q=>q.startsWith(selYear));
  return D.years;
}
function tgt(){return (parseFloat(document.getElementById('tgtInput').value)||0)*1e8;}

// ─── YEAR PILLS ──────────────────────────────────────────────────────────────
function initYearPills(){
  const el=document.getElementById('yearPills');
  el.innerHTML=['all',...D.years].map(y=>`<button class="ypill${y===selYear?' on':''}" onclick="setYear('${y}')">${y==='all'?'전체':y+'년'}</button>`).join('');
  const yBtn=document.getElementById('btnY');
  yBtn.style.opacity=selYear==='all'?'1':'0.35';
  yBtn.style.pointerEvents=selYear==='all'?'auto':'none';
}
function setYear(y){
  selYear=y;
  if(y!=='all'&&mode==='Y'){mode='M';['M','Q','Y'].forEach(x=>document.getElementById('btn'+x).classList.toggle('on',x==='M'));}
  initYearPills(); render();
}

// ─── CHART HELPERS ────────────────────────────────────────────────────────────
function mkChart(id,type,data,opts){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),{type,data,options:opts});}
const ttBase={backgroundColor:'#fff',borderColor:'#E5E7EB',borderWidth:1,titleColor:C3,bodyColor:'#374151',padding:12,titleFont:{size:13},bodyFont:{size:13}};

// ─── KPI ─────────────────────────────────────────────────────────────────────
function renderKPI(){
  const tt=src('total'), grand=tt.reduce((s,r)=>s+r.total,0), tg=tgt();
  const ach=tg>0?Math.round(grand/tg*100):null;
  const ss=src('sys');
  const allQ=ss.reduce((s,r)=>s+r.qty,0), gmQ=ss.filter(r=>r.System==='GMPP').reduce((s,r)=>s+r.qty,0), vQ=ss.filter(r=>r.System==='VBP').reduce((s,r)=>s+r.qty,0);
  const pp=periods();
  document.getElementById('topPeriodLabel').textContent=selYear==='all'?(pp[0]+' ~ '+pp[pp.length-1]):selYear+'년 '+(mode==='M'?'월별':mode==='Q'?'분기별':'');
  const kpis=[
    {l:'전체 매출',v:fmtB(grand),s:fmtN(grand)+' KRW',ach,accent:false},
    {l:'시스템 총 판매',v:allQ+'대',s:fmtB(ss.reduce((s,r)=>s+r.rev,0))+' (장비)',ach:null,accent:true},
    {l:'GMPP',v:gmQ+'대',s:'GentleMAX PRO PLUS',ach:null,accent:false},
    {l:'VBP',v:vQ+'대',s:'VBEAM PERFECTA',ach:null,accent:true},
    {l:'기타 시스템',v:(allQ-gmQ-vQ)+'대',s:'Cryo 7 · GMP · GLP',ach:null,accent:false},
  ];

// ─── REP TABLE ────────────────────────────────────────────────────────────────
function renderRepTable(){
  const rd=src('rep'), rsd=src('repsys'), tg=tgt(), repTgt=tg>0?tg/D.reps.length:0;
  let totRev=0, totSys={};D.systems.forEach(s=>totSys[s]={qty:0,rev:0});
  let html=`<table><thead><tr><th>담당자</th><th>총 매출</th><th>달성률</th><th>시스템 합계</th>${D.systems.map(s=>`<th>${s}</th>`).join('')}</tr></thead><tbody>`;
  D.reps.forEach(rep=>{
    const rev=rd.filter(r=>r.rep===rep).reduce((s,r)=>s+r.amount,0);
    totRev+=rev;
    const ach=repTgt>0?Math.round(rev/repTgt*100):null;
    const bc=ach===null?'#E5E7EB':ach>=100?C1:C2;
    const bw=ach!==null?Math.min(ach,150):0;
    const sysQ={},sysR={};
    D.systems.forEach(s=>{sysQ[s]=rsd.filter(r=>r.rep===rep&&r.System===s).reduce((a,r)=>a+r.qty,0);sysR[s]=rsd.filter(r=>r.rep===rep&&r.System===s).reduce((a,r)=>a+r.rev,0);totSys[s].qty+=sysQ[s];totSys[s].rev+=sysR[s];});
    const totalSys=D.systems.reduce((s,sys)=>s+sysQ[sys],0);
    html+=`<tr class="rep-clickable" onclick="openModal('${rep}')">
      <td style="color:${C1};font-weight:700">${rep}<span class="drill-icon">↗</span></td>
      <td style="font-weight:700">${fmtB(rev)}</td>
      <td>${ach!==null?`<div class="ach-wrap"><div class="ach-bg"><div class="ach-fill" style="width:${bw}%;background:${bc}"></div></div><span class="ach-pct" style="color:${bc}">${ach}%</span></div>`:'<span style="color:#E5E7EB;font-size:.75rem">미설정</span>'}</td>
      <td>${totalSys}대</td>
      ${D.systems.map(s=>sysQ[s]>0?`<td><span class="tag t${s==='VBP'||s==='GLP'?'2':'1'}">${sysQ[s]}대</span><br><small style="color:#9CA3AF;font-size:.7rem">${fmtB(sysR[s])}</small></td>`:`<td style="color:#E5E7EB">—</td>`).join('')}
    </tr>`;
  });
  const gTotal=D.systems.reduce((s,sys)=>s+totSys[sys].qty,0);
  html+=`</tbody><tfoot><tr><td>합계</td><td>${fmtB(totRev)}</td><td></td><td>${gTotal}대</td>${D.systems.map(s=>`<td>${totSys[s].qty}대</td>`).join('')}</tr></tfoot></table>`;
  document.getElementById('repTable').innerHTML=html;
}

// ─── SYS TABLE ────────────────────────────────────────────────────────────────
function renderSysTable(){
  const data=src('sys'), pp=periods(), usedSys=D.systems.filter(s=>data.some(r=>r.System===s));
  const get=(s,p,f)=>{const r=data.find(x=>x.System===s&&x.period===p);return r?r[f]:0;};
  let html=`<table><thead><tr><th>시스템</th>`;
  pp.forEach(p=>html+=`<th colspan="2" style="text-align:center;border-left:1px solid #E5E7EB">${p}</th>`);
  html+=`<th colspan="2" style="text-align:center;border-left:1px solid #E5E7EB">합계</th></tr><tr><th></th>`;
  pp.forEach(()=>html+=`<th style="border-left:1px solid #E5E7EB">대수</th><th>매출</th>`);
  html+=`<th style="border-left:1px solid #E5E7EB">대수</th><th>매출</th></tr></thead><tbody>`;
  usedSys.forEach(s=>{let tQ=0,tR=0;html+=`<tr><td><span class="tag t${s==='VBP'||s==='GLP'?'2':'1'}">${s}</span></td>`;
    pp.forEach(p=>{const q=get(s,p,'qty'),r=get(s,p,'rev');tQ+=q;tR+=r;html+=`<td style="border-left:1px solid #E5E7EB">${q||'—'}</td><td>${q?fmtB(r):'—'}</td>`;});
    html+=`<td style="border-left:1px solid #E5E7EB;font-weight:700">${tQ}대</td><td style="font-weight:700">${fmtB(tR)}</td></tr>`;});
  let aQ=0,aR=0;html+=`<tfoot><tr><td>합계</td>`;
  pp.forEach(p=>{const q=data.filter(r=>r.period===p).reduce((s,r)=>s+r.qty,0),r=data.filter(r=>r.period===p).reduce((s,r)=>s+r.rev,0);aQ+=q;aR+=r;html+=`<td style="border-left:1px solid #E5E7EB">${q}대</td><td>${fmtB(r)}</td>`;});
  html+=`<td style="border-left:1px solid #E5E7EB">${aQ}대</td><td>${fmtB(aR)}</td></tr></tfoot></table>`;
  document.getElementById('sysTable').innerHTML=html;
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function searchCustomer(q){
  const ra=document.getElementById('searchResultArea'), sl=document.getElementById('searchList');
  ra.className='search-result'; sl.innerHTML='';
  if(!q.trim()){ra.style.display='none';return;}
  const matches=D.all_cust.filter(c=>c.customer.toLowerCase().includes(q.toLowerCase()));
  if(matches.length===0){sl.innerHTML=`<div class="no-result">검색 결과 없음</div>`;return;}
  // exact/best match card
  const best=matches[0];
  const sysDet=D.cust_sys_detail?D.cust_sys_detail.filter(r=>r.customer===best.customer):[];
  ra.style.display='block';
  ra.innerHTML=`<div class="sr-name">📍 ${best.customer}</div>
    <div class="sr-row"><span style="color:var(--ink3)">시스템 구매 총수량</span><strong style="color:${C1}">${best.total_qty}대</strong></div>
    <div class="sr-row"><span style="color:var(--ink3)">총 매출</span><strong style="color:${C1}">${fmtB(best.total_rev)}</strong></div>
    ${sysDet.filter(r=>r.qty>0).map(r=>`<div class="sr-row"><span class="tag t${r.system==='VBP'||r.system==='GLP'?'2':'1'}">${r.system}</span><strong>${r.qty}대 · ${fmtB(r.rev)}</strong></div>`).join('')}`;
  // list
  if(matches.length>1){sl.innerHTML=`<div style="font-size:.78rem;color:var(--ink3);margin:10px 0 4px">관련 고객 (${matches.length}건)</div>`+
    matches.slice(1,8).map(c=>`<div class="lb-item" style="cursor:pointer" onclick="document.getElementById('custSearch').value='${c.customer.replace(/'/g,"\\'")}';searchCustomer('${c.customer.replace(/'/g,"\\'")}')">
      <div class="lb-name" style="font-size:.85rem">${c.customer}</div>
      <div class="lb-meta"><span class="lb-qty" style="font-size:.9rem">${c.total_qty}대</span><span class="lb-rev">${fmtB(c.total_rev)}</span></div>
    </div>`).join('');}
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(rep){
  const rows=D.rep_cust.filter(r=>r.rep===rep);
  const totalQ=rows.reduce((s,r)=>s+r.qty,0), totalR=rows.reduce((s,r)=>s+r.rev,0);
  const bySys={};rows.forEach(r=>{if(!bySys[r.system])bySys[r.system]={qty:0,rev:0};bySys[r.system].qty+=r.qty;bySys[r.system].rev+=r.rev;});
  document.getElementById('modalTitle').textContent=rep;
  document.getElementById('modalSub').textContent='시스템 고객별 판매 상세 (전체 기간)';
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-stats">
      <div class="mstat"><div class="mstat-val">${rows.filter((v,i,a)=>a.findIndex(x=>x.customer===v.customer)===i).length}</div><div class="mstat-lbl">고객 수</div></div>
      <div class="mstat"><div class="mstat-val">${totalQ}대</div><div class="mstat-lbl">판매 대수</div></div>
      <div class="mstat"><div class="mstat-val">${fmtB(totalR)}</div><div class="mstat-lbl">총 매출</div></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${Object.entries(bySys).map(([s,v])=>`<span class="tag t${s==='VBP'||s==='GLP'?'2':'1'}" style="font-size:.78rem;padding:4px 12px">${s} ${v.qty}대 · ${fmtB(v.rev)}</span>`).join('')}</div>
    <div class="twrap"><table>
      <thead><tr><th>고객명</th><th>시스템</th><th>수량</th><th>매출</th></tr></thead>
      <tbody>${rows.sort((a,b)=>b.rev-a.rev).map(r=>`<tr>
        <td>${r.customer}</td>
        <td><span class="tag t${r.system==='VBP'||r.system==='GLP'?'2':'1'}">${r.system}</span></td>
        <td>${r.qty}대</td>
        <td>${fmtB(r.rev)}</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr><td>합계</td><td></td><td>${totalQ}대</td><td>${fmtB(totalR)}</td></tr></tfoot>
    </table></div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
